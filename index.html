<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Consulta CREAS</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background-color: #ffffff;
    }
    header {
      text-align: center;
      margin-bottom: 20px;
    }
    header img {
      max-height: 80px;
    }
    header h1, header h2, header h3 {
      margin: 5px 0;
    }
    .tabs {
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
    }
    .tab-button {
      padding: 10px 20px;
      margin: 0 10px;
      cursor: pointer;
      border: none;
      border-bottom: 3px solid transparent;
      background-color: #ddd;
    }
    .tab-button.active {
      background-color: #fff;
      border-bottom: 3px solid #007BFF;
    }
    .tab-content {
      display: none;
      background-color: #fff;
      padding: 20px;
      border-radius: 5px;
    }
    .tab-content.active {
      display: block;
    }
    input, select {
      padding: 10px;
      width: 100%;
      margin: 10px 0;
      box-sizing: border-box;
    }
    .resultado, .lista-bairros {
      margin-top: 20px;
    }
    #sugestoes div {
      padding: 5px;
      background: #f0f0f0;
      border-bottom: 1px solid #ccc;
      cursor: pointer;
    }
    #sugestoes div:hover {
      background: #e0e0e0;
    }
  </style>
</head>
<body>
  <header>
    <img src="https://www.goiania.go.gov.br/upload/arquivos/2020-06/logo-prefeitura-horizontal-cor.png" alt="Logo Prefeitura de Goiânia">
    <h1>Secretaria Municipal de Desenvolvimento Humano e Social</h1>
    <h2>Diretoria de Proteção Social Especial</h2>
    <h3>Gerência de Proteção Social de Média Complexidade</h3>
  </header>

  <div class="tabs">
    <button class="tab-button active" onclick="abrirAba('aba1')">Consulta CREAS por Bairro</button>
    <button class="tab-button" onclick="abrirAba('aba2')">Consulta de bairros por CREAS</button>
  </div>

  <div id="aba1" class="tab-content active">
    <input type="text" id="bairroInput" placeholder="Digite o nome do bairro...">
    <div id="sugestoes"></div>
    <div id="resultado" class="resultado"></div>
  </div>

  <div id="aba2" class="tab-content">
    <select id="creasSelect">
      <option value="">Selecione um CREAS</option>
    </select>
    <div id="bairrosPorCreas" class="lista-bairros"></div>
  </div>

  <script>
    let dadosBairros = [];
    let dadosCreas = [];

    async function carregarDados() {
      const urlBairros = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR4TZkD-YhQkE9yOJ0rc0AFitqzPI8KUTaGglAljxg2oVDy_GM_9QnZBtEGMJELY_uhhMfPDtKwhspX/pub?gid=579319961&single=true&output=csv";
      const urlCreas = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRWxiE1xElemwD02wqCOATxk-JmhRVz48XvxKoGMfSSqHmo4_fpYiLpaj4ZVvxqB_CCabA9uBC5nbQX/pub?gid=0&single=true&output=csv";

      const [resBairros, resCreas] = await Promise.all([fetch(urlBairros), fetch(urlCreas)]);
      const textoBairros = await resBairros.text();
      const textoCreas = await resCreas.text();

      const linhasBairros = textoBairros.trim().split("\n").slice(1);
      dadosBairros = linhasBairros.map(l => {
        const [bairro, creas, link] = l.split("\t");
        return { bairro, creas, link };
      });

      const linhasCreas = textoCreas.trim().split("\n").slice(1);
      dadosCreas = linhasCreas.map(l => {
        const [creas, endereco, telefone, link] = l.split("\t");
        return { creas, endereco, telefone, link };
      });

      preencherSelectCreas();
    }

    function preencherSelectCreas() {
      const select = document.getElementById("creasSelect");
      dadosCreas.forEach(c => {
        const option = document.createElement("option");
        option.value = c.creas;
        option.textContent = c.creas;
        select.appendChild(option);
      });
    }

    document.getElementById("bairroInput").addEventListener("input", function () {
      const entrada = this.value.toLowerCase();
      const sugestoes = dadosBairros.filter(item => item.bairro.toLowerCase().includes(entrada));

      const divSugestoes = document.getElementById("sugestoes");
      divSugestoes.innerHTML = "";
      sugestoes.forEach(item => {
        const div = document.createElement("div");
        div.textContent = item.bairro;
        div.onclick = () => mostrarResultado(item);
        divSugestoes.appendChild(div);
      });
    });

    function mostrarResultado(item) {
      const creasInfo = dadosCreas.find(c => c.creas === item.creas);
      let html = `<h3>Bairro: ${item.bairro}</h3>`;
      html += `<p><strong>CREAS Responsável:</strong> ${item.creas}</p>`;
      if (creasInfo) {
        html += `<p><strong>Endereço:</strong> ${creasInfo.endereco}</p>`;
        html += `<p><strong>Telefone:</strong> ${creasInfo.telefone}</p>`;
        if (creasInfo.link) {
          html += `<iframe src="${creasInfo.link}" width="100%" height="300" style="border:0;" allowfullscreen="" loading="lazy"></iframe>`;
        }
      }
      document.getElementById("resultado").innerHTML = html;
      document.getElementById("sugestoes").innerHTML = "";
    }

    document.getElementById("creasSelect").addEventListener("change", function () {
      const creasSelecionado = this.value;
      const bairros = dadosBairros.filter(b => b.creas === creasSelecionado);
      const div = document.getElementById("bairrosPorCreas");
      div.innerHTML = bairros.map(b => `<p>${b.bairro}</p>`).join("");
    });

    function abrirAba(id) {
      document.querySelectorAll('.tab-button').forEach(btn => btn.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      const btn = id === 'aba1' ? document.querySelectorAll('.tab-button')[0] : document.querySelectorAll('.tab-button')[1];
      btn.classList.add('active');
    }

    carregarDados();
  </script>
</body>
</html>
