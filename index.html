<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Consulta CREAS por Bairro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      margin: 0 auto;
      max-width: 700px;
    }

    header {
      text-align: center;
      margin-bottom: 20px;
    }

    header h1, header h2, header h3, header h4 {
      margin: 2px;
      font-weight: normal;
    }

    h2#titulo {
      text-align: center;
      margin-top: 30px;
      font-size: 24px;
    }

    input {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      box-sizing: border-box;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    ul#sugestoes {
      list-style: none;
      padding: 0;
      margin-top: 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      max-height: 150px;
      overflow-y: auto;
    }

    ul#sugestoes li {
      padding: 10px;
      cursor: pointer;
    }

    ul#sugestoes li:hover {
      background-color: #f0f0f0;
    }

    #resultado {
      margin-top: 20px;
      font-size: 18px;
      font-weight: normal;
      text-align: center;
    }

    .creas-nome {
      color: green;
      font-weight: bold;
    }

    @media (max-width: 600px) {
      body {
        padding: 15px;
      }

      h2#titulo {
        font-size: 20px;
      }

      input {
        font-size: 16px;
      }

      #resultado {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>

  <header>
    <p>Prefeitura de Goiânia</p>
    <p>Secretaria Municipal de Política para as Mulheres, Assistência Social e Direitos Humanos</p>
    <p>Diretoria de Proteção Social Especial</p>
    <p>Gerência de Proteção Social de Média Complexidade</p>
  </header>

  <h2 id="titulo">Consulta de CREAS por Bairro</h2>

  <input type="text" id="bairroInput" placeholder="Digite o nome do bairro..." oninput="mostrarSugestoes()">
  <ul id="sugestoes"></ul>
  <div id="resultado"></div>

  <script>
    const urlCSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR4TZkD-YhQkE9yOJ0rc0AFitqzPI8KUTaGglAljxg2oVDy_GM_9QnZBtEGMJELY_uhhMfPDtKwhspX/pub?gid=579319961&single=true&output=csv";
    let dados = [];

    async function carregarDados() {
      const resposta = await fetch(urlCSV);
      const texto = await resposta.text();

      const linhas = texto.trim().split(/\r?\n/);
      for (let i = 1; i < linhas.length; i++) {
        const linha = linhas[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
        const bairro = linha[0]?.replace(/(^"|"$)/g, "").trim();
        const creas = linha[1]?.replace(/(^"|"$)/g, "").trim();
        if (bairro && creas) dados.push({ bairro, creas });
      }
    }

    function mostrarSugestoes() {
      const entrada = document.getElementById("bairroInput").value.trim().toLowerCase();
      const sugestoesEl = document.getElementById("sugestoes");
      const resultadoEl = document.getElementById("resultado");

      sugestoesEl.innerHTML = "";
      resultadoEl.textContent = "";

      if (entrada === "") return;

      const sugestoes = dados.filter(item => item.bairro.toLowerCase().includes(entrada));

      sugestoes.forEach(item => {
        const li = document.createElement("li");
        li.textContent = item.bairro;
        li.onclick = () => {
          document.getElementById("bairroInput").value = item.bairro;
          sugestoesEl.innerHTML = "";
          resultadoEl.innerHTML = `Esse bairro está na abrangência do <span class="creas-nome">${item.creas.toUpperCase()}</span>.`;
        };
        sugestoesEl.appendChild(li);
      });
    }

    carregarDados();
  </script>

</body>
</html>
